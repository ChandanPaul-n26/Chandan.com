<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Snake Game</title>
    <link rel="stylesheet" href="999.css">
</head>
<body>
    <div class="game-container">
        <h1>🐍 Advanced Snake Game</h1>
        <div class="mode-selector">
            <button id="normal-mode" class="mode-btn active">Normal Mode</button>
            <button id="wrap-mode" class="mode-btn">Wrap Mode</button>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="score-board">
            <span id="score">Score: 0</span>
            <span id="high-score">High Score: 0</span>
        </div>
        <button id="restart-btn">Restart Game</button>
        <button id="home-btn">Back to Home</button>
    </div>
    <script src="999.js"></script>
</body>
</html>
