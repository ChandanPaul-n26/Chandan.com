<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expance Tracker</title>
    <link rel="stylesheet" href="ExpanceTracker.css">
</head>
<body>
    <div class="cp">
        <div class="cp1">
            <h1>Expance Tracker</h1>
            <div class="cp2">
                <input type="text" placeholder="Expance Name" id="expanceName">
                <input type="number" placeholder="Amount" id="expanceAmount">
                <select id="expanceType">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Other">Other</option>
                </select>
                <input type="date" id="expanceDate">
                <button type="submit" id="addExpance">Add Expance</button>
            </div>
            <div class="cp3">
                <h2>Expance List</h2>
                <table id="expanceTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Amount</th>
                            <th>Type</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expanceList">
                        <!-- Expance items will be added here dynamically -->
                    </tbody>
                </table>
                <div class="cp4">
                    <h3>Total Expance: $<span id="totalExpance">0</span></h3>
                </div>
                <div class="filter">
                    <label for="filter-category">Filter by Category:</label>
                    <select id="filter-category">
                        <option value="All">All</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
  <script src="ExpanceTracker.js"></script>
</body>
</html>
