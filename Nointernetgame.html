<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Internet Game - Dinosaur Runner</title>
    <link rel="stylesheet" href="Nointernetgame.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="controls">
            <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
            <button class="difficulty-btn" data-difficulty="extreme">Extreme</button>
        </div>
        
        <div class="cp">
            <div class="cp1">
                <h1>🦖 Dinosaur Runner</h1>
                
                <div class="stats-panel">
                    <div class="stat">
                        <div class="stat-label">SCORE</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">HIGH SCORE</div>
                        <div class="stat-value" id="highScore">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">LEVEL</div>
                        <div class="stat-value" id="level">1</div>
                    </div>
                </div>
                
                <div class="frame">
                    <div id="dino">🦖</div>
                    <div id="obstacle"></div>
                    <div id="powerup" class="powerup" style="display:none;"></div>
                    <div id="shield" class="shield" style="display:none;"></div>
                    <div class="score" id="score-display">Score: 0</div>
                    <div class="game-over" id="gameOver" style="display:none;">
                        <div class="game-over-text">GAME OVER!</div>
                        <div class="game-stats">
                            Final Score: <span id="final-score">0</span><br>
                            High Score: <span id="high-score-display">0</span>
                        </div>
                        <button onclick="restartGame()">RESTART GAME</button>
                        <button onclick="goHome()" style="margin-left: 10px; background: #667eea;">BACK HOME</button>
                    </div>
                </div>
                
                <p style="color: white; margin-top: 20px; font-weight: bold;">Press <strong>SPACE</strong> to Jump | Use <strong>UP ARROW</strong> or tap the screen</p>
            </div>
        </div>
    </div>
<script src="Nointernetgame.js"></script>
</body>
</html>
